name: Notify Library Scanner on Release
on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Library Scanner Monitor
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.SCANNER_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/hunter78602/Library-Scanner-Pro/actions/workflows/monitor.yml/dispatches \
            -d '{"ref":"main"}'
